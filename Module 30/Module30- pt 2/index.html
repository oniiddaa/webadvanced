<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 30-pt 2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <h1>DIGITAL SCHOOL CLOCK</h1>

    <h2 id="clock">clock goes here </h2>

    <picture>
        <img src="img/ds_clock.png" id="timeImage">
    </picture>

    <h4>SET WAKE UP TIME</h4>

    <select id="wakeUpTimeSelector">

        <option value="1">1 Am - 2 Am</option>
        <option value="3">3 Am - 4 Am</option>
        <option value="4">4 Am - 5 Am</option>
        <option value="5" selected>5 Am - 6 Am</option>
        <option value="18">6 Am - 7 Am</option>
        <option value="19">7 Am - 8 Am</option>

    </select>

    <h4>SET DIGITAL SCHOOL CLASS TIME</h4>

    <select id="dsTimeSelector">

        <option value="1">1 Am - 2 Am</option>
        <option value="3">3 Am - 4 Am</option>
        <option value="4">4 Am - 5 Am</option>
        <option value="5" selected>5 Am - 6 Am</option>
        <option value="18">6 Am - 7 Am</option>
        <option value="19">7 Am - 8 Am</option>

    </select>

    <h4>SET SLEEP TIME</h4>

    <select id="sleepTimeSelector">

        <option value="1">1 Am - 2 Am</option>
        <option value="3">3 Am - 4 Am</option>
        <option value="4">4 Am - 5 Am</option>
        <option value="5" selected>5 Am - 6 Am</option>
        <option value="18">6 Am - 7 Am</option>
        <option value="19">7 Am - 8 Am</option>

    </select>

    <br>
    <br>

    <button id="saveButton">SAVE</button>

    



    <script src="main.js"></script>
</body>
</html>
