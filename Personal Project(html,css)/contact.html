<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | 2026 Trends</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="contact.css">
</head>
<body>
    <section id="contact-hero">
        <div class="container">
            <header>
                <img src="images/logo.png" alt="Logo" class="logo">
                <nav>
                    <ul>
                        <li><a href="index.html">HOME</a></li>
                        <li><a href="about.html">ABOUT</a></li>
                        <li class="active"><a href="contact.html">CONTACT</a></li>
                    </ul>
                </nav>
            </header>
            <div class="main-heading">
                <h1>Get in Touch</h1>
                <p>Collaborate with us on the next big silhouette.</p>
            </div>
        </div>
    </section>

    <section id="contact-main">
        <div class="container">
            <div class="contact-wrapper">
                
                <div class="contact-info">
                    <h2>Our Studios</h2>
                    <div class="line"></div>
                    <div class="info-item">
                        <h3>Prishtina Studio</h3>
                        <p>12 Fashion Ave, Prishtina, Kosovo</p>
                    </div>
                    <div class="info-item">
                        <h3>Inquiries</h3>
                        <p>onidamisiri@gmail.com</p>
                        <p>+383 44 000 000</p>
                    </div>
                    <div class="social-icons">
                        <p>Follow our journey on Instagram & TikTok</p>
                    </div>
                </div>

                <div class="form-container">
                    <form action="#">
                        <div class="row">
                            <div class="input-group">
                                <label for="fname">First Name</label>
                                <input type="text" id="fname" name="firstname" placeholder="Enter your name">
                            </div>
                            <div class="input-group">
                                <label for="lname">Last Name</label>
                                <input type="text" id="lname" name="lastname" placeholder="Enter your last name">
                            </div>
                        </div>

                        <label for="interest">Primary Interest</label>
                        <select id="interest" name="interest">
                            <option value="poetcore">Poetcore Styling</option>
                            <option value="glamoratti">Glamoratti Collection</option>
                            <option value="celestial">Extra-Celestial Tech</option>
                            <option value="commercial">Commercial Partnership</option>
                        </select>

                        <label for="subject">Message</label>
                        <textarea id="subject" name="subject" placeholder="Tell us about your project or inquiry..." style="height:150px"></textarea>

                        <input type="submit" value="Send Message" class="submit-btn">
                    </form>
                </div>

            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2026 Fashion Collective. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
